name: "E2E Staging Tests"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag that was deployed (informational)"
        required: false
        default: "staging"

permissions:
  contents: read

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Wait for Tailscale connectivity
        run: |
          for i in $(seq 1 30); do
            if tailscale ping --timeout 2s influence-staging 2>/dev/null; then
              echo "Tailscale connection established"
              exit 0
            fi
            echo "Waiting for Tailscale... ($i/30)"
            sleep 2
          done
          echo "Failed to connect to influence-staging via Tailscale"
          exit 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bunx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://influence-staging
