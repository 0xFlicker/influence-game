name: "Build PR"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
      head_sha:
        description: "PR head commit SHA"
        required: true
  pull_request:
    types:
      - synchronize

concurrency:
  group: build-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  ephemeral-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      should_deploy: ${{ steps.status.outputs.should_deploy }}
      pr_number: ${{ steps.status.outputs.pr_number }}
      head_sha: ${{ steps.status.outputs.head_sha }}
    steps:
      - name: Determine ephemeral redeploy eligibility
        id: status
        uses: actions/github-script@v7
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('should_deploy', 'true');
              core.setOutput('pr_number', process.env.INPUT_PR_NUMBER);
              core.setOutput('head_sha', process.env.INPUT_HEAD_SHA);
              core.notice('Manual dispatch requested; deploying regardless of PR lifecycle comments.');
              return;
            }

            const pull = context.payload.pull_request;
            const prNumber = pull.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const lifecycle = comments
              .filter((comment) =>
                comment.body?.includes('### Ephemeral deployment ready') ||
                comment.body?.includes('### Ephemeral deployment destroyed')
              )
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            const latest = lifecycle.at(-1);
            const shouldDeploy = latest?.body?.includes('### Ephemeral deployment ready') === true;

            core.setOutput('should_deploy', shouldDeploy ? 'true' : 'false');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', pull.head.sha);

            if (shouldDeploy) {
              core.notice(`Latest ephemeral lifecycle comment is ready; redeploying PR #${prNumber}.`);
            } else if (latest) {
              core.notice(`Latest ephemeral lifecycle comment is destroyed; skipping redeploy for PR #${prNumber}.`);
            } else {
              core.notice(`No live ephemeral lifecycle comment found; skipping redeploy for PR #${prNumber}.`);
            }

  check:
    needs: ephemeral-status
    if: needs.ephemeral-status.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: influence
          POSTGRES_PASSWORD: influence
          POSTGRES_DB: influence_test
        ports:
          - 54320:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://influence:influence@127.0.0.1:54320/influence_test
      DRIZZLE_MIGRATIONS_DIR: ./drizzle

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ephemeral-status.outputs.head_sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  docker-build-push:
    needs:
      - ephemeral-status
      - check
    if: needs.ephemeral-status.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            dockerfile: Dockerfile.api
            image: ghcr.io/0xflicker/influence-api
          - target: web
            dockerfile: Dockerfile.web
            image: ghcr.io/0xflicker/influence-web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ephemeral-status.outputs.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            --build-arg GIT_SHA=${{ needs.ephemeral-status.outputs.head_sha }} \
            -t ${{ matrix.image }}:pr-${{ needs.ephemeral-status.outputs.pr_number }} \
            .
          docker push ${{ matrix.image }}:pr-${{ needs.ephemeral-status.outputs.pr_number }}

  trigger-deploy:
    needs:
      - ephemeral-status
      - docker-build-push
    if: needs.ephemeral-status.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: 0xFlicker
          repositories: linode-iac

      - name: Trigger ephemeral deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '0xFlicker',
              repo: 'linode-iac',
              workflow_id: 'deploy-ephemeral.yml',
              ref: 'main',
              inputs: {
                pr_number: '${{ needs.ephemeral-status.outputs.pr_number }}',
                image_tag: 'pr-${{ needs.ephemeral-status.outputs.pr_number }}',
                source_repo: '${{ github.repository }}'
              }
            });
