name: "Build PR"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
      head_sha:
        description: "PR head commit SHA"
        required: true

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: influence
          POSTGRES_PASSWORD: influence
          POSTGRES_DB: influence_test
        ports:
          - 54320:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://influence:influence@127.0.0.1:54320/influence_test
      DRIZZLE_MIGRATIONS_DIR: ./drizzle

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  docker-build-push:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            dockerfile: Dockerfile.api
            image: ghcr.io/0xflicker/influence-api
          - target: web
            dockerfile: Dockerfile.web
            image: ghcr.io/0xflicker/influence-web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            --build-arg GIT_SHA=${{ inputs.head_sha }} \
            -t ${{ matrix.image }}:pr-${{ inputs.pr_number }} \
            .
          docker push ${{ matrix.image }}:pr-${{ inputs.pr_number }}

  trigger-deploy:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: 0xFlicker
          repositories: linode-iac

      - name: Trigger ephemeral deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '0xFlicker',
              repo: 'linode-iac',
              workflow_id: 'deploy-ephemeral.yml',
              ref: 'main',
              inputs: {
                pr_number: '${{ inputs.pr_number }}',
                image_tag: 'pr-${{ inputs.pr_number }}',
                source_repo: '${{ github.repository }}'
              }
            });
