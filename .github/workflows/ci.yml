name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: influence
          POSTGRES_PASSWORD: influence
          POSTGRES_DB: influence_test
        ports:
          - 54320:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://influence:influence@127.0.0.1:54320/influence_test
      DRIZZLE_MIGRATIONS_DIR: ./drizzle

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  render-worker-pr-build:
    if: github.event_name == 'pull_request'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build render worker
        run: docker build -f Dockerfile.render-worker -t influence-render-worker:pr-check .

      - name: Verify render worker runtime
        run: |
          docker run --rm --entrypoint sh influence-render-worker:pr-check -ec '
            ffmpeg -version >/dev/null
            chromium --version >/dev/null
            test "$(find /app/music/house-highlights-variants -name "*.m4a" | wc -l)" -ge 24
          '

  docker-build-push:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.sha.outputs.short }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            dockerfile: Dockerfile.api
            image: ghcr.io/0xflicker/influence-api
            build_args: ""
          - target: web
            dockerfile: Dockerfile.web
            image: ghcr.io/0xflicker/influence-web
            build_args: '--build-arg PRIVY_APP_ID="$PRIVY_APP_ID"'
          - target: render-worker
            dockerfile: Dockerfile.render-worker
            image: ghcr.io/0xflicker/influence-render-worker
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.target }}
        env:
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            --build-arg GIT_SHA=${{ github.sha }} \
            ${{ matrix.build_args }} \
            -t ${{ matrix.image }}:${{ steps.sha.outputs.short }} \
            -t ${{ matrix.image }}:staging \
            .
          if [ "${{ matrix.target }}" = "render-worker" ]; then
            docker run --rm --entrypoint sh ${{ matrix.image }}:${{ steps.sha.outputs.short }} -ec '
              ffmpeg -version >/dev/null
              chromium --version >/dev/null
              test "$(find /app/music/house-highlights-variants -name "*.m4a" | wc -l)" -ge 24
            '
          fi
          docker push ${{ matrix.image }}:${{ steps.sha.outputs.short }}
          docker push ${{ matrix.image }}:staging

  tag-deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: docker-build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create staging deployment tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="staging/$(date -u +%Y-%m-%d)/$(echo ${{ github.sha }} | cut -c1-7)"
          git tag -a "$TAG" -m "Staging deploy from ${GITHUB_SHA}"
          git push origin "$TAG"

  trigger-deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: 0xFlicker
          repositories: linode-iac

      - name: Trigger staging deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '0xFlicker',
              repo: 'linode-iac',
              workflow_id: 'deploy-staging.yml',
              ref: 'main',
              inputs: {
                image_tag: '${{ needs.docker-build-push.outputs.image_tag }}'
              }
            });
