name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: influence
          POSTGRES_PASSWORD: influence
          POSTGRES_DB: influence_test
        ports:
          - 54320:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://influence:influence@127.0.0.1:54320/influence_test
      DRIZZLE_MIGRATIONS_DIR: ./drizzle

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  docker-build-push:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            dockerfile: Dockerfile.api
            image: ghcr.io/0xflicker/influence-api
          - target: web
            dockerfile: Dockerfile.web
            image: ghcr.io/0xflicker/influence-web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t ${{ matrix.image }}:${{ steps.sha.outputs.short }} \
            -t ${{ matrix.image }}:staging \
            .
          docker push ${{ matrix.image }}:${{ steps.sha.outputs.short }}
          docker push ${{ matrix.image }}:staging

  tag-deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: docker-build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create staging deployment tag
        run: |
          TAG="staging/$(date -u +%Y-%m-%d)/$(echo ${{ github.sha }} | cut -c1-7)"
          git tag -a "$TAG" -m "Staging deploy from ${GITHUB_SHA}"
          git push origin "$TAG"

  trigger-deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: 0xFlicker
          repositories: linode-iac

      - name: Trigger staging deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '0xFlicker',
              repo: 'linode-iac',
              workflow_id: 'deploy-staging.yml',
              ref: 'main',
              inputs: {
                image_tag: 'staging'
              }
            });
