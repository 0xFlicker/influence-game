<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#164E63"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="64" fill="url(#bg)"/>
  <g transform="translate(64,64)" fill="none" stroke="white" stroke-width="3.5" opacity="0.95">
    <!-- Magnifying glass -->
    <circle cx="-6" cy="-6" r="16"/>
    <line x1="6" y1="6" x2="22" y2="22" stroke-width="5" stroke-linecap="round"/>
    <!-- Inner lens glare -->
    <path d="M-14,-12 C-12,-16 -6,-18 -2,-16" stroke="white" stroke-width="2" opacity="0.5" fill="none"/>
    <!-- Detail dots -->
    <circle cx="-6" cy="-6" r="2" fill="white" opacity="0.3" stroke="none"/>
  </g>
</svg>
